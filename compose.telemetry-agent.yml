name: jellypulse-telemetry

services:
  agent:
    build: .
    restart: unless-stopped
    command: npm run telemetry-agent
    ports: ["${TELEMETRY_AGENT_BIND_ADDRESS:-127.0.0.1}:${TELEMETRY_AGENT_PORT:-9469}:9469"]
    environment:
      DOCKER_HOST: tcp://docker-proxy:2375
      TELEMETRY_AGENT_TOKEN: ${TELEMETRY_AGENT_TOKEN}
      TELEMETRY_AGENT_PORT: 9469
      TELEMETRY_HOST_FALLBACK: ${TELEMETRY_HOST_FALLBACK:-true}
      JELLYFIN_CONTAINER_NAME: ${JELLYFIN_CONTAINER_NAME:-jellyfin}
      GPU_METRICS_URL: ${GPU_METRICS_URL:-}
      GPU_METRIC_NAME: ${GPU_METRIC_NAME:-}
      GPU_METRIC_SCALE: ${GPU_METRIC_SCALE:-1}
      GPU_METRICS_VENDOR: ${GPU_METRICS_VENDOR:-}
    depends_on:
      docker-proxy:
        condition: service_started
    volumes: [/proc:/host/proc:ro]

  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes: [/var/run/docker.sock:/var/run/docker.sock:ro]

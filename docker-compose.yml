services:
  app:
    build: .
    restart: unless-stopped
    # Localhost only by default. Put it behind HTTPS/VPN before changing this.
    ports: ["${APP_BIND_ADDRESS:-127.0.0.1}:3000:3000"]
    environment:
      PGHOST: db
      PGPORT: 5432
      PGUSER: reporter
      PGPASSWORD: ${POSTGRES_PASSWORD}
      PGDATABASE: reporter
      # Generate once: openssl rand -base64 32. Never change after setup.
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-false}
      DOCKER_HOST: tcp://docker-proxy:2375
      JELLYFIN_CONTAINER_NAME: ${JELLYFIN_CONTAINER_NAME:-jellyfin}
      GPU_METRICS_URL: ${GPU_METRICS_URL:-}
      GPU_METRIC_NAME: ${GPU_METRIC_NAME:-}
      GPU_METRIC_SCALE: ${GPU_METRIC_SCALE:-1}
      GPU_METRICS_VENDOR: ${GPU_METRICS_VENDOR:-}
    depends_on:
      db:
        condition: service_healthy
      docker-proxy:
        condition: service_started

  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: reporter
      POSTGRES_USER: reporter
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes: [postgres-data:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reporter -d reporter"]
      interval: 5s
      timeout: 5s
      retries: 12

  # The app gets read-only Docker metadata/stats, never direct Docker-socket access.
  docker-proxy:
    image: tecnativa/docker-socket-proxy:latest
    restart: unless-stopped
    environment:
      CONTAINERS: 1
      POST: 0
      AUTH: 0
      BUILD: 0
      COMMIT: 0
      CONFIGS: 0
      DISTRIBUTION: 0
      EVENTS: 0
      EXEC: 0
      IMAGES: 0
      INFO: 0
      NETWORKS: 0
      NODES: 0
      PLUGINS: 0
      SECRETS: 0
      SERVICES: 0
      SWARM: 0
      SYSTEM: 0
      TASKS: 0
      VOLUMES: 0
    volumes: [/var/run/docker.sock:/var/run/docker.sock:ro]

volumes:
  postgres-data:
